# ------------------------------------------------------------
# TOX GLOBAL CONFIGURATION
# ------------------------------------------------------------

[tox]
envlist = py314
skipsdist = true


# ------------------------------------------------------------
# FLAKE8 CONFIGURATION
# ------------------------------------------------------------

[flake8]
exclude =
    .git,
    __pycache__,
    .venv,
    env,
    venv,
    build,
    dist,
    node_modules,
    .tox,
    .env

max-line-length = 120


# ------------------------------------------------------------
# ISORT CONFIGURATION
# ------------------------------------------------------------

[isort]
profile = black


# ------------------------------------------------------------
# DEFAULT TEST ENVIRONMENT
# ------------------------------------------------------------

[testenv]
setenv =
    PYTHONPATH = {toxinidir}
deps =
    -rrequirements.txt
    -rrequirements-dev.txt
    pytest
    pytest-cov

commands =
    black --check .
    isort --check-only .
    flake8 .

    pytest -vv \
        --cov=src/service \
        --cov-report=term-missing \
        --cov-fail-under=70 \
        -s . --maxfail=0


# ------------------------------------------------------------
# FORMAT ENVIRONMENT (AUTO-FIX)
# ------------------------------------------------------------

[testenv:format]
description = Run black & isort auto-formatters
deps =
    black
    isort

commands =
    isort .
    black .
